# Baseline YOLOv8n trained on COCO, exported to ONNX.
#
# Useful as a Phase-1 sanity-check detector before custom litter weights
# are trained. The full COCO 80-class space is filtered downstream to
# the litter-relevant subset by whatever consumer cares (e.g. the
# benchmark harness or the robot policy layer).
#
# To produce the ONNX weights:
#   pip install ultralytics
#   yolo export model=yolov8n.pt format=onnx imgsz=640 dynamic=False simplify=True
# Place the resulting yolov8n.onnx next to this file (or update `weights:`).

backend: onnx
weights: yolov8n.onnx
input_size: [640, 640]
providers:
  - CPUExecutionProvider
score_threshold: 0.25
iou_threshold: 0.45

class_names:
  - person
  - bicycle
  - car
  - motorcycle
  - airplane
  - bus
